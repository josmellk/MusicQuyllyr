<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/star.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>musica</title>
  <style>
    body {
      background-color: #0a0a0a;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .splash-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #f1c40f, #e67e22);
      border-radius: 20px;
      position: relative;
      animation: pulse 1.5s infinite ease-in-out;
    }

    .splash-logo::after {
      content: '★';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #000;
    }

    .splash-text {
      color: #fff;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 2px;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.6;
      }

      50% {
        transform: scale(1.05);
        opacity: 1;
      }

      100% {
        transform: scale(0.95);
        opacity: 0.6;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="splash-container">
      <div class="splash-logo"></div>
      <div class="splash-text">CARGANDO</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
